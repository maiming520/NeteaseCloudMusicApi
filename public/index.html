<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私人轻量音乐站</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto}
body{background:#0f0f0f;color:#fff;padding-bottom:90px}
.container{max-width:1000px;margin:0 auto;padding:20px}
.header{text-align:center;margin:20px 0}
.search-box{display:flex;gap:10px;margin:20px auto;max-width:600px}
#search-input{flex:1;padding:12px 16px;border:none;border-radius:12px;background:#222;color:#fff;font-size:16px}
#search-btn{padding:12px 20px;background:#1db954;border:none;border-radius:12px;color:#fff;cursor:pointer}
.song-item{display:flex;align-items:center;padding:12px 16px;border-radius:10px;background:#1a1a1a;margin:8px 0;gap:14px}
.song-item:hover{background:#2a2a2a}
.song-item img{width:48px;height:48px;border-radius:6px;object-fit:cover}
.song-info{flex:1}
.song-name{font-size:15px;margin-bottom:4px}
.song-artist{font-size:12px;color:#aaa}
.lyric-box{max-height:300px;overflow-y:auto;background:#181818;border-radius:12px;padding:16px;margin:20px 0;text-align:center;line-height:1.8}
.lyric-line{color:#888;font-size:14px;margin:6px 0}
.lyric-line.active{color:#1db954;font-size:16px}
.player-bar{position:fixed;bottom:0;left:0;right:0;background:#121212;padding:16px;border-top:1px solid #222}
.control-btn{display:flex;justify-content:center;gap:20px;margin-bottom:10px}
.control-btn button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer}
audio{width:100%;border-radius:8px}
.empty{text-align:center;color:#666;margin:40px 0}
</style>
</head>

<body>
<div class="container">
<div class="header"><h2>🎵 私人轻量音乐站</h2></div>

<div class="search-box">
<input type="text" id="search-input" placeholder="输入歌曲名搜索">
<button id="search-btn">搜索</button>
</div>

<div id="song-list"></div>
<div class="lyric-box" id="lyric-box">歌词将在这里显示</div>
</div>

<div class="player-bar">
<div class="control-btn">
<button id="prev">⏮</button>
<button id="play-btn">▶</button>
<button id="next">⏭</button>
<button id="mode">🔁</button>
</div>
<audio id="audio" controls>
</div>

<script>
// ========== 已替换为你的域名 music.567.one 无需修改 ==========
const API_BASE = 'https://music.567.one'
// 关键修复：添加网易云登录Cookie，解决版权不可播放问题！
// 在这里填入你自己网易云登录Cookie，下面教你怎么获取
const NETEASE_COOKIE = ''

const audio = document.getElementById('audio')
const songList = document.getElementById('song-list')
const lyricBox = document.getElementById('lyric-box')
const searchBtn = document.getElementById('search-btn')
const searchInput = document.getElementById('search-input')
const playBtn = document.getElementById('play-btn')
const prevBtn = document.getElementById('prev')
const nextBtn = document.getElementById('next')
const modeBtn = document.getElementById('mode')

let songData = []
let currentIndex = 0
let playMode = 0 //0顺序 1循环 2随机

// 修复搜索：完整请求头，带上Cookie
async function searchSong(keyword){
if(!keyword.trim()) return
songList.innerHTML='<div class="empty">搜索中...</div>'
try{
const res = await fetch(`${API_BASE}/search?keywords=${encodeURIComponent(keyword)}&limit=20`,{
headers:{
'Cookie': NETEASE_COOKIE
}
})
const json = await res.json()
songData = json.result?.songs||[]
renderList()
}catch(e){
songList.innerHTML='<div class="empty">搜索接口异常，请检查API</div>'
console.error(e)
}
}

// 渲染歌单
function renderList(){
if(songData.length===0){songList.innerHTML='<div class="empty">暂无搜索结果</div>';return}
songList.innerHTML=''
songData.forEach((song,idx)=>{
const item=document.createElement('div')
item.className='song-item'
item.innerHTML=`
<img src="${song.al.picUrl}">
<div class="song-info">
<div class="song-name">${song.name}</div>
<div class="song-artist">${song.ar.map(a=>a.name).join('/')}</div>
</div>`
item.onclick=()=>{currentIndex=idx;playSong(song.id)}
songList.appendChild(item)
})
}

// 修复播放：请求带上Cookie，解决版权不可播放！
async function playSong(id){
try{
const res=await fetch(`${API_BASE}/song/url?id=${id}&level=exhigh`,{
headers:{
'Cookie': NETEASE_COOKIE
}
})
const json=await res.json()
const url=json.data[0]?.url
if(!url){alert('版权不可播放，请更换歌曲或登录网易云账号');return}
audio.src=url
audio.play()
playBtn.textContent='⏸'
getLyric(id)
}catch(e){alert('播放请求失败');console.error(e)}
}

// 获取歌词
async function getLyric(id){
lyricBox.innerHTML='加载歌词...'
try{
const res=await fetch(`${API_BASE}/lyric?id=${id}`,{headers:{'Cookie':NETEASE_COOKIE}})
const json=await res.json()
const lrc=json.lrc?.lyric||'暂无歌词'
lyricBox.innerHTML=parseLyric(lrc)
}catch(e){lyricBox.innerHTML='歌词加载失败'}
}

// 解析歌词时间轴
function parseLyric(text){
const reg=/\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/g
const lines=[]
let result
while((result=reg.exec(text))!==null){
const min=parseInt(result[1]),sec=parseInt(result[2])
const time=min*60+sec+parseInt(result[3])/1000
lines.push({time,text:result[4]})
}
return lines.map((l,i)=>`<div class="lyric-line" data-time="${l.time}">${l.text}</div>`).join('')
}

// 歌词同步高亮
audio.ontimeupdate=()=>{
const time=audio.currentTime
const lines=lyricBox.querySelectorAll('.lyric-line')
lines.forEach(line=>{
const t=parseFloat(line.dataset.time)
if(Math.abs(t-time)<2)line.classList.add('active')
else line.classList.remove('active')
})
}

// 播放暂停切换
playBtn.onclick=()=>{audio.paused?audio.play():audio.pause()}
audio.onplay=()=>playBtn.textContent='⏸'
audio.onpause=()=>playBtn.textContent='▶'

// 上一首
prevBtn.onclick=()=>{
currentIndex=(currentIndex-1+songData.length)%songData.length
playSong(songData[currentIndex].id)
}

// 下一首
nextBtn.onclick=()=>{
currentIndex=(currentIndex+1)%songData.length
playSong(songData[currentIndex].id)
}

// 播放模式
modeBtn.onclick=()=>{
playMode=(playMode+1)%3
modeBtn.textContent=playMode===0?'🔁':playMode===1?'🔂':'🎲'
}

// 歌曲结束自动下一首
audio.onended=()=>{
if(playMode===1)playSong(songData[currentIndex].id)
else nextBtn.click()
}

// 修复搜索回车+点击
searchBtn.onclick=()=>searchSong(searchInput.value)
searchInput.onkeydown=e=>e.key==='Enter'&&searchSong(searchInput.value)

// 默认加载你之前的歌单
window.onload=async()=>{
songList.innerHTML='加载默认歌单中...'
const res=await fetch(`${API_BASE}/playlist/detail?id=5185298264`,{headers:{'Cookie':NETEASE_COOKIE}})
const json=await res.json()
songData=json.playlist?.tracks||[]
renderList()
}
</script>
</body>
</html>
